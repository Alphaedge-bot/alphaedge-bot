# config/config.yaml
# AlphaEdge V13.0.7 – Main Configuration File
# Created: July 7, 2026
# Updated: July 18, 2026 – Added Volume Profile

# ============================================
# BOT IDENTITY
# ============================================
bot:
  name: "AlphaEdge"
  version: "V13.0.7"
  status: "PRODUCTION READY"
  date: "July 18, 2026"
  region: "MALAYSIA HOME OFFICE OPTIMIZED"
  
  core_principles:
    - "Solana primary + Multi-chain (Base, Arbitrum, Ethereum, BSC)"
    - "Base currency: USDC (Stage 1) / USDC + USDT (Stage 2)"
    - "Momentum-only breakout strategy"
    - "Hold ONLY highest momentum tokens (by ROC velocity)"
    - "Dynamic season allocation (Micro/Small/Mid dominance)"
    - "Micro-cap: 1.15x ranking multiplier (max 2-6 positions)"
    - "Rotate out of tokens that fall out of top tier"
    - "Dynamic capital allocation by regime (12 regimes)"
    - "Performance Score (weighted fusion of 312 strategies)"
    - "Post only after breakout (never during range)"
    - "Never reveal bot holds positions"
    - "Price action FIRST. Indicators CONFIRM only."
    - "No paid marketing. Organic growth only."
    - "Upgrade only. Never downgrade."
    - "Fed Liquidity = primary macro risk toggle"
    - "DXY HIGH = Stablecoins (not Crypto)"
    - "Dynamic timeframes by market cap tier"
    - "Inverted trailing stops: Micro 3-4%, Mid 7-8%"
    - "Two daily digests: Public (education) + Private (full)"
    - "AI proposes changes → Bot verifies → Only upgrades accepted"

# ============================================
# HARDWARE CONFIGURATION
# ============================================
hardware:
  stage: 1
  description: "Stage 1 (DDR4) – Entry-level validated hardware"
  
  stage_1_ddr4:
    cost: "$800-2,000"
    cpu: "AMD Ryzen 7 5800X / Intel i7-12700K"
    ram: "32GB DDR4-3200 (64GB optional)"
    gpu: "RTX 3060 12GB (optional, integrated GPU works)"
    storage: "1TB NVMe PCIe Gen 4 SSD"
    network: "500Mbps wired"
    capital_limit: 25000
    monthly_return: "15-25%"
    agents: 58
    strategies: 233
    
  stage_2_ddr5:
    description: "Stage 2 – DDR5 High-Performance Intermediate"
    cost: "$3,000-5,000"
    cpu: "AMD Threadripper 7960X (24 cores)"
    ram: "128GB DDR5-6000"
    gpu: "RTX 4090 24GB (optional)"
    storage: "2TB Gen5 NVMe"
    network: "1GbE"
    capital_limit: 50000
    monthly_return: "25-35%"
    agents: 72
    strategies: 312
    extensions: "C++/Rust for Python core"
    
  stage_3_fpga:
    description: "Stage 3 – FPGA Ultimate Production"
    cost: "$13,000-16,000 (Dual Node)"
    cpu: "AMD Threadripper 7960X (24 cores)"
    ram: "128GB DDR5-6000"
    fpga: "AMD Alveo U50"
    storage: "2TB Gen5 NVMe + 4TB Gen4 backup"
    networking: "Dual 2.5GbE NICs + Switch"
    capital_limit: 100000
    monthly_return: "35-45%"
    agents: 72
    strategies: 312
    failover: "<2 seconds"

# ============================================
# NETWORK & POWER
# ============================================
network:
  speed: "500Mbps"
  utilization: "3% (33x capacity)"
  backup: "5G wireless (Maxis/Celcom/Digi)"
  
power:
  ups: "APC Smart-UPS 1500VA"
  runtime: "30-60 minutes"

# ============================================
# WALLET CONFIGURATION
# ============================================
wallets:
  wallet_1_trading:
    purpose: "100% trading capital"
    balance: "USDC"
    bot_access: "FULL"
    user_access: "VIEW ONLY"
    capital_limit: 25000
    
  wallet_2_operations:
    purpose: "Gas fees + API costs"
    balance:
      SOL: 1.0
      ETH: 0.05
      BNB: 0.5
    bot_access: "AUTO-PAY"
    user_access: "VIEW + APPROVE"
    refill_source: "Dynamic from Wallet 1"
    
  wallet_3_user_profit:
    purpose: "User profit + Stage 2 savings"
    balance: "USDC"
    bot_access: "DEPOSIT ONLY"
    user_access: "FULL"

# ============================================
# BLOCKCHAIN CONFIGURATION
# ============================================
blockchain:
  primary: "Solana"
  multi_chain:
    - "Base"
    - "Arbitrum"
    - "Ethereum"
    - "BSC"
    
  rpc:
    solana:
      primary: "Jito Singapore"
      secondary: "Helius Singapore"
      fallback: "Helius Free"
      public: "Public"
      
    endpoints:
      jito: "https://api.mainnet-beta.solana.com"
      helius: "https://rpc.helius.xyz/"
      
  gas_tokens:
    SOL: 0.5
    ETH: 0.02-0.05
    BNB: 0.5

# ============================================
# TRADING UNIVERSE
# ============================================
trading_universe:
  micro_cap:
    range: "<$50M"
    max_positions: "2-6"
    ranking_multiplier: 1.15
    
  small_cap:
    range: "$50M-200M"
    max_positions: "4-10"
    
  mid_cap:
    range: "$200M-1B"
    max_positions: "4-12"
    
  excluded:
    large_cap: ">$1B (BTC, ETH, SOL, BNB, XRP, ADA, etc.)"
    lending_tokens: "AAVE, COMP, MKR, RDNT"
    gambling_tokens: "Casino/ponzi mechanics"

# ============================================
# GOLD SWAP CONFIGURATION
# ============================================
gold_swap:
  enabled: true
  active: true
  primary_asset: "paxg"
  fallback_asset: "xaut"
  
  assets:
    paxg:
      symbol: "PAXG"
      name: "Paxos Gold"
      priority: 1
      backing: "1 PAXG = 1 fine troy ounce of gold"
      
    xaut:
      symbol: "XAUT"
      name: "Tether Gold"
      priority: 2
      backing: "1 XAUT = 1 fine troy ounce of gold"
      
  thresholds:
    min_swap_amount: 100
    max_slippage_percent: 1.5
    max_gas_usd: 5.00
    split_threshold: 5000
    max_splits: 5
    
  recovery:
    depeg_threshold: 0.01
    recovery_threshold: 0.005
    check_interval_seconds: 60

# ============================================
# ZONE DETECTION (ICT/SMC)
# ============================================
zone_detection:
  enabled: true
  max_zones: 28
  lookback: 3000
  atr_length: 200
  vol_length: 50
  
  imbalance_zones:
    enabled: true
    min_gap_atr: 0.05
    min_gap_pct: 0.0
    
  stop_pool_zones:
    enabled: true
    left_bars: 12
    right_bars: 4
    pool_height: 0.45
    pool_buffer: 0.03
    
  scoring:
    elite_threshold: 8.0
    size_norm: 1.20
    vol_norm: 1.40
    test_norm: 3.0
    conf_norm: 2.0
    prox_norm: 6.0
    weights:
      volume: 0.25
      size: 0.20
      test: 0.20
      confluence: 0.20
      proximity: 0.15
    
  lifecycle:
    merge_overlap: 0.15
    stale_deviation: 6.0
    keep_done: true

# ============================================
# MCDX CONFIGURATION
# ============================================
mcdx:
  enabled: true
  auto_length: true
  length: 34
  sma_pc_len: 10
  sma_lc_len: 10
  
  tps_adjustments:
    golden_cross: 5.0
    bottom_catch: 8.0
    double_dragon: 10.0
    oversold: 4.0
    death_cross: -5.0
    overbought: -4.0
    
  filters:
    min_adx: 25
    min_tps_for_entry: 82

# ============================================
# SMART MONEY CONCEPTS (ICT/SMC) CONFIGURATION
# ============================================
smart_money_concepts:
  enabled: true
  swing_length: 10
  internal_length: 5
  equal_highs_lows_length: 3
  equal_highs_lows_threshold: 0.15
  fvg_threshold: 0.5
  atr_length: 14
  min_confluence_score: 3
  
  tps_adjustments:
    # Bullish Signals
    swing_bos_bullish: 6.0
    swing_choch_bullish: 4.0
    internal_bos_bullish: 3.0
    bullish_ob: 4.0
    bullish_ob_validated: 8.0
    bullish_breaker: 6.0
    bullish_fvg: 4.0
    bullish_ifvg: 5.0
    bpr_active: 3.0
    bullish_ote: 4.0
    cisd_bullish: 3.0
    inducement_triggered: 3.0
    discount_zone: 3.0
    
    # Bearish Signals
    swing_bos_bearish: -6.0
    swing_choch_bearish: -4.0
    internal_bos_bearish: -3.0
    bearish_ob: -4.0
    bearish_ob_validated: -8.0
    bearish_breaker: -6.0
    bearish_fvg: -4.0
    bearish_ifvg: -5.0
    bearish_ote: -4.0
    cisd_bearish: -3.0
    premium_zone: -3.0
    
    # Confluence
    confluence_score_high: 6.0
    confluence_score_medium: 3.0

# ============================================
# VOLUME PROFILE CONFIGURATION (Item 12)
# ============================================
volume_profile:
  enabled: true
  bins: 50
  value_area_pct: 0.70
  min_volume_threshold: 1000
  lookback_bars: 200
  timeframes:
    - "15M"
    - "1H"
    - "4H"
  
  tps_adjustments:
    poc_match: 5.0
    vah_val_match: 3.0
    confluence_match: 5.0
    timeframe_alignment: 2.0

# ============================================
# PROFIT ALLOCATION
# ============================================
profit_allocation:
  phase_1_before_25k:
    condition: "Wallet 1 capital < $25,000"
    to_wallet_2: 0.05  # 5% operations
    to_wallet_3: 0.05  # 5% user expenses
    reinvested: 0.90   # 90% growth
    
  phase_2_after_25k:
    condition: "Wallet 1 capital ≥ $25,000"
    to_wallet_2: 0.05  # 5% operations
    to_wallet_3: 0.95  # 95% Stage 2 savings
    reinvested: 0.0
    
  stage_2_purchase:
    trigger: "Wallet 3 balance ≥ $22,000"
    action: "User withdraws $22,000 from Wallet 3"
    destination: "Stage 2 Dual Node hardware purchase"

# ============================================
# STABLECOIN STRATEGY
# ============================================
stablecoin:
  stage_1: "100% USDC"
  stage_2: "50% USDC + 50% USDT"
  
  core_principle: "NO lending protocols. NO yield generation. Hold ONLY."
  
  depeg_protection:
    usdc_depeg: "Swap USDC → USDT"
    usdt_depeg: "Swap USDT → USDC"
    both_depeg: "Swap all → Gold (PAXG)"
    
  gold_backup:
    asset: "PAXG"
    backing: "1 PAXG = 1 fine troy ounce of gold"
    trigger: "Both stablecoins depeg >1%"
    recovery: "Swap back when stablecoins recover (<0.5% deviation)"
    
  blocked_protocols:
    - "Aave"
    - "Drift Protocol"
    - "Compound"
    - "Morpho"
    - "Euler"
    - "Any lending/borrowing protocol"

# ============================================
# SCORING SYSTEMS
# ============================================
scoring:
  tps:
    purpose: "Ticker Performance Score"
    range: "0-100"
    entry_threshold: 82
    hold_threshold: 70
    exit_threshold: 49
    
    components:
      technical: 30
      volume: 25
      momentum: 20
      macro: 10
      sentiment: 5
      onchain: 5
      robustness: 5
      
  bpg:
    purpose: "Bot Performance Grade"
    range: "A-F with 0-100 numeric"
    
    grades:
      A: "90-100% – Exceptional"
      A-: "85-89% – Outstanding"
      B+: "80-84% – Very Strong"
      B: "75-79% – Strong"
      B-: "70-74% – Good"
      C+: "65-69% – Above Average"
      C: "60-64% – Average"
      C-: "55-59% – Below Average"
      D: "45-54% – Needs Improvement"
      F: "0-44% – Critical Issues"
      
    components:
      sharpe_ratio: 0.30
      win_rate: 0.25
      max_drawdown: 0.20
      monthly_return: 0.15
      uptime: 0.10

# ============================================
# FED LIQUIDITY – PRIMARY MACRO RISK TOGGLE
# ============================================
fed_liquidity:
  calculation:
    formula: "WALCL - WTREGEN - RRPONTTLD"
    source: "FRED API (free tier)"
    update: "Weekly (H.4.1 report) + Daily (TGA/RRP)"
    
  ta_analysis:
    emas: "4-week, 13-week, 52-week"
    trend_lines: "Higher highs/lower lows"
    support_resistance: "Previous cycle highs/lows, psychological levels"
    rsi: "14-week RSI (overbought/oversold)"
    macd: "Weekly MACD (bullish/bearish cross)"
    
  scoring:
    components:
      ema_status: 25
      trend_structure: 25
      rsi_status: 20
      macd_status: 15
      breakout_pattern: 15
      
  interpretation:
    "80-100": "STRONG EXPANSION → 100% Crypto (max)"
    "60-79": "EXPANSION → Increase Crypto (1.2-1.5x)"
    "40-59": "NEUTRAL → Normal allocation"
    "20-39": "CONTRACTION → Reduce Crypto (0.5-0.8x)"
    "0-19": "STRONG CONTRACTION → 100% Stablecoins"

# ============================================
# ALLOCATION MATRIX
# ============================================
allocation_matrix:
  crypto_dxy_gold:
    "HIGH, LOW, LOW": "100% Crypto (Alts) – Risk-on"
    "HIGH, HIGH, LOW": "100% Stablecoins – DXY drains liquidity"
    "HIGH, LOW, HIGH": "100% Crypto (Alts) – Debasement"
    "LOW, HIGH, LOW": "100% Stablecoins – Cash is king"
    "LOW, HIGH, HIGH": "100% Gold (PAXG) – Flight to safety"
    "LOW, LOW, HIGH": "100% Gold (PAXG) – Gold momentum"
    "HIGH, HIGH, HIGH": "Check Fed Multiplier 1.0x = Crypto, <1.0x = DXY"
    "LOW, LOW, LOW": "Yield-Bearing Cash – Inflation protection"

# ============================================
# GITHUB REPOSITORY
# ============================================
github:
  username: "Alphaedge-bot"
  repository: "alphaedge-bot"
  visibility: "Private"
  url: "https://github.com/Alphaedge-bot/alphaedge-bot"
  
  structure:
    root:
      - ".gitignore"
      - "LICENSE"
      - "README.md"
    /agents: "72 agent files (agent_00.py to agent_72.py)"
    /strategies: "312 strategy files"
    /pine_scripts: "3 Pine Scripts"
    /config: "4 configuration files"
    /database: "SQLite schema"
    /tests: "Test suites"
    /docs: "Documentation"
    /scripts: "Deployment scripts"

# ============================================
# TIMESCALEDB CONFIGURATION
# ============================================
timescaledb:
  enabled: true
  host: "localhost"
  port: 5432
  database: "alphaedge"
  user: "alphaedge"
  password: "${TIMESCALEDB_PASSWORD}"  # Use environment variable
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  pool_recycle: 3600
  
  retention:
    raw_data_days: 30
    aggregated_days: 365
    metrics_days: 90
    
  continuous_aggregates:
    refresh_interval: "1 minute"
    refresh_after: "1 minute"

# ============================================
# ONE-LINE SUMMARY
# ============================================
summary: "AlphaEdge V13.0.7: 72 agents, 312 strategies, 13/13 rating, 215k lines. Hardware: Stage 1 DDR4 → Stage 2 DDR5 (C++/Rust) → Stage 3 FPGA. KIV backlog: 36 upgrades for win rate (+6-10%) and profit (+10-17%). Rule #1: Only Upgrade, No Downgrade. Added: RPC Hedged Requests, Capital Siloing, Dynamic Jito Tips, Sandwich Isolation Guard, TimescaleDB, Volume Profile."
