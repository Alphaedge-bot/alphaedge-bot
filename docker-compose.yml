# docker-compose.yml
# AlphaEdge V13.0.7 – TimescaleDB Docker Setup
# Item 16: TimescaleDB Integration

version: '3.8'

services:
  # ============================================
  # TIMESCALEDB DATABASE
  # ============================================
  timescaledb:
    image: timescale/timescaledb:2.11.0-pg15
    container_name: alphaedge_db
    environment:
      POSTGRES_USER: alphaedge
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD}
      POSTGRES_DB: alphaedge
      # Optional: Tune performance
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphaedge -d alphaedge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alphaedge_network

  # ============================================
